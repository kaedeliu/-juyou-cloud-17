server:
  port: 8090
  tomcat:
    uri-encoding: UTF-8

spring:
  servlet:
    encoding:
      charset: UTF-8
      force: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 2MB
      max-request-size: 5MB

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

knife4j:
  enable: true

